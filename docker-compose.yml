services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mtg-proxy-bot
    hostname: mtg-proxy-bot
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - .:/app
    restart: unless-stopped
    networks:
      - mtg-proxy-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mtg-proxy-api
    hostname: mtg-proxy-api
    env_file: .env
    entrypoint: ["sh", "entrypoint-api.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      bot:
        condition: service_started
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - .:/app
    restart: unless-stopped
    networks:
      - mtg-proxy-network

  postgres:
    image: postgres:17-alpine
    container_name: mtg-proxy-postgres
    hostname: mtg-proxy-postgres
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mtg-proxy-network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_BOT_USERNAME: ${VITE_BOT_USERNAME:-}
    container_name: mtg-proxy-web
    hostname: mtg-proxy-web
    depends_on:
      - api
    ports:
      - "127.0.0.1:3000:80"
    restart: unless-stopped
    networks:
      - mtg-proxy-network

  redis:
    image: redis:7-alpine
    container_name: mtg-proxy-redis
    hostname: mtg-proxy-redis
    restart: unless-stopped
    networks:
      - mtg-proxy-network

volumes:
  postgres_data:

networks:
  mtg-proxy-network:
    name: mtg-proxy-network
