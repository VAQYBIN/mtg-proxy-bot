name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          release-type: simple

      - name: Trigger Docker build for new release
        if: steps.release.outputs.release_created
        run: |
          gh workflow run production.yml \
            --ref main \
            -f version=${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
